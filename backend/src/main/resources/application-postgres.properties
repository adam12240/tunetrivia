# PostgreSQL profile: persistent stats storage
# Activate with: SPRING_PROFILES_ACTIVE=postgres

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/tunetrivia}
spring.datasource.username=${POSTGRES_USER:tunetrivia}
spring.datasource.password=${POSTGRES_PASSWORD:tunetrivia}

# Add explicit driver for Postgres (avoid H2 driver being used with postgres URL)
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# H2 console disabled under postgres profile
spring.h2.console.enabled=false

# Server
server.port=${PORT:3002}

# Auth / OAuth config (same env vars as default)
app.oauth2.google.clientId=${GOOGLE_CLIENT_ID:}
app.oauth2.google.clientSecret=${GOOGLE_CLIENT_SECRET:}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.oauth2.google.redirectUri=${GOOGLE_REDIRECT_URI:http://localhost:3002/api/auth/callback}
app.auth.jwtSecret=${JWT_SECRET:}

# Flyway baseline for existing schema: initialize schema history at version 0 so V1 migrations will be applied
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
