spring.datasource.url=jdbc:h2:mem:tunetrivia;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

server.port=3002

app.oauth2.google.clientId=${GOOGLE_CLIENT_ID:}
app.oauth2.google.clientSecret=${GOOGLE_CLIENT_SECRET:}
app.frontend.url=http://localhost:5173

app.oauth2.google.redirectUri=${GOOGLE_REDIRECT_URI:http://localhost:3002/api/auth/callback}

app.auth.jwtSecret=${JWT_SECRET:}
