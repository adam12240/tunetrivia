services:
  postgres:
    image: postgres:16
    container_name: tunetrivia-postgres
    environment:
      POSTGRES_DB: tunetrivia
      POSTGRES_USER: tunetrivia
      POSTGRES_PASSWORD: tunetrivia
    ports:
      - "5433:5432"
    volumes:
      - tunetrivia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tunetrivia -d tunetrivia"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tunetrivia_pgdata:
